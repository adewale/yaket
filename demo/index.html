<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yaket vs TF-IDF</title>
    <meta
      name="description"
      content="Compare Yaket and TF-IDF on the same text in a minimal browser demo."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #10151d;
        --panel: #171d27;
        --field: #1c2330;
        --line: rgba(205, 214, 231, 0.14);
        --line-strong: rgba(205, 214, 231, 0.24);
        --text: rgba(242, 245, 249, 0.92);
        --muted: rgba(196, 205, 220, 0.74);
        --subtle: rgba(163, 174, 193, 0.68);
        --accent: #8fb1ff;
        --mark-yaket: rgba(143, 177, 255, 0.24);
        --mark-tfidf: rgba(255, 210, 120, 0.24);
        --shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.5rem max(20px, 4vw) 2.5rem;
      }

      h1,
      h2,
      h3,
      p,
      ul {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      h2 {
        font-size: 0.95rem;
        font-weight: 650;
      }

      h3 {
        font-size: 0.9rem;
        font-weight: 650;
      }

      .intro {
        display: grid;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .intro p {
        max-width: 70ch;
        color: var(--muted);
        line-height: 1.55;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.85fr);
        gap: 1rem;
        align-items: start;
      }

      .main-column {
        display: grid;
        gap: 1rem;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 0.85rem;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 1rem;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }

      .config-controls {
        grid-template-columns: 1fr;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
        font-weight: 550;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border-radius: 0.7rem;
        border: 1px solid var(--line);
        background: var(--field);
        color: var(--text);
        padding: 0.78rem 0.88rem;
      }

      textarea {
        min-height: 14rem;
        resize: vertical;
        line-height: 1.55;
      }

      input:focus,
      select:focus,
      textarea:focus,
      button:focus {
        outline: none;
      }

      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      button:focus-visible {
        border-color: rgba(143, 177, 255, 0.58);
        box-shadow: 0 0 0 3px rgba(143, 177, 255, 0.12);
      }

      .sample-picker {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line-strong);
        border-radius: 0.7rem;
        background: #202a39;
        color: var(--text);
        cursor: pointer;
        padding: 0.8rem 1rem;
      }

      button:hover,
      button:focus-visible {
        border-color: rgba(143, 177, 255, 0.48);
        background: #263245;
      }

      .sample-button[aria-pressed="true"] {
        border-color: rgba(143, 177, 255, 0.58);
        background: rgba(143, 177, 255, 0.16);
      }

      .status {
        color: var(--subtle);
        font-size: 0.92rem;
      }

      .results-panel {
        transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
      }

      .results-panel.updated {
        border-color: rgba(143, 177, 255, 0.44);
        box-shadow: 0 0 0 2px rgba(143, 177, 255, 0.12), var(--shadow);
      }

      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .updated-label {
        color: var(--subtle);
        font-size: 0.82rem;
      }

      .comparison {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .topic-list {
        list-style: none;
        padding: 0;
        display: grid;
        gap: 0.45rem;
      }

      .topic-list li {
        color: var(--text);
      }

      .highlight-box {
        border: 1px solid rgba(205, 214, 231, 0.08);
        border-radius: 0.7rem;
        background: var(--field);
        color: var(--muted);
        padding: 0.8rem 0.9rem;
        line-height: 1.65;
      }

      .overlap {
        color: var(--muted);
        line-height: 1.55;
      }

      mark.yaket {
        background: var(--mark-yaket);
        color: var(--text);
        border-radius: 0.25rem;
        padding: 0.02rem 0.16rem;
      }

      mark.tfidf {
        background: var(--mark-tfidf);
        color: var(--text);
        border-radius: 0.25rem;
        padding: 0.02rem 0.16rem;
      }

      @media (max-width: 900px) {
        .layout,
        .controls,
        .comparison {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <h1>Yaket vs TF-IDF</h1>
        <p>
          Compare Yaket and TF-IDF on the same text. Yaket is <strong>Single-document</strong>, uses
          <strong>Local statistical features</strong>, and needs <strong>No training corpus</strong>.
        </p>
      </section>

      <section class="layout">
        <section class="main-column">
          <section class="panel stack">
            <label for="sample-picker">Sample text
              <div class="sample-picker" id="sample-picker"></div>
            </label>
            <span class="status" id="status">Ready.</span>
          </section>

          <section class="results-panel panel stack" id="results-panel">
            <div class="results-header">
              <h2>Results</h2>
              <span class="updated-label" id="updated-label">Updated —</span>
            </div>

            <div class="comparison">
              <section class="stack">
                <h2>Yaket results</h2>
                <ul class="topic-list" id="yaket-results"></ul>
                <div class="stack">
                  <h3>Yaket highlights</h3>
                  <div class="highlight-box" id="yaket-highlights">—</div>
                </div>
              </section>

              <section class="stack">
                <h2>TF-IDF baseline</h2>
                <ul class="topic-list" id="tfidf-results"></ul>
                <div class="stack">
                  <h3>TF-IDF highlights</h3>
                  <div class="highlight-box" id="tfidf-highlights">—</div>
                </div>
              </section>
            </div>

            <section class="stack">
              <h2>Overlap</h2>
              <div class="overlap" id="overlap">—</div>
            </section>
          </section>
        </section>

        <section class="panel stack">
          <form id="controls" onsubmit="return false;">
            <div class="controls config-controls">
              <label for="language">Language
                <input id="language" value="en" autocomplete="off" />
              </label>
              <label for="top">Top results
                <input id="top" type="number" min="1" value="10" />
              </label>
              <label for="ngram">Max n-gram
                <input id="ngram" type="number" min="1" value="3" />
              </label>
            </div>

            <label for="input">Text
              <textarea id="input"></textarea>
            </label>
          </form>
        </section>
      </section>
    </main>

    <script type="module">
      import { extractKeywordDetails, loadStopwords, splitSentences, tokenizeWords } from "https://esm.sh/@ade_oshineye/yaket@0.4.0?bundle";

      const SAMPLE_PRESETS = [
        {
          id: "abstract",
          label: "Scientific abstract",
          language: "en",
          ngram: 3,
          top: 10,
          text: `We present a lightweight keyword extraction method for single documents based on multiple local statistical features. The method combines term frequency, sentence position, spread, casing patterns, and term co-occurrence to rank both single-word and multi-word candidates without using an external corpus or supervised training data. Experimental results on benchmark datasets show strong overlap with reference YAKE outputs while remaining practical for browser and edge runtimes.`
        },
        {
          id: "news",
          label: "News article",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Google is acquiring data science community Kaggle. Sources tell us that Google is acquiring Kaggle, a platform that hosts data science and machine learning competitions. Details about the transaction remain somewhat vague, but the acquisition would give Google access to one of the largest communities of practicing data scientists and machine learning competitors.`
        },
        {
          id: "newsletter",
          label: "Newsletter",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Consumer AI is being absorbed by platforms. Enterprise AI converges around a few vendors. Vertical AI is the third path. If consumer gets absorbed by incumbents and enterprise consolidates around platforms, vertical AI carves out domain-specific value. The APIs become commodities. Meta just acqui-hired both Gizmo and Dreamer. Karpathy's software model evolves. The ecosystem grows through network effects.`
        },
        {
          id: "product-docs",
          label: "Product docs",
          language: "en",
          ngram: 2,
          top: 10,
          text: `The indexing service creates hybrid retrieval metadata for each chunk. It stores BM25 text fields, dense embeddings, chunk-level filters, and weighted keywords. Incremental reindexing reuses previous vectors, but always refreshes keyword metadata so search results stay explainable and debuggable.`
        }
      ];

      const samplePicker = document.getElementById("sample-picker");
      const input = document.getElementById("input");
      const language = document.getElementById("language");
      const top = document.getElementById("top");
      const ngram = document.getElementById("ngram");
      const status = document.getElementById("status");
      const resultsPanel = document.getElementById("results-panel");
      const updatedLabel = document.getElementById("updated-label");
      const yaketResults = document.getElementById("yaket-results");
      const tfidfResults = document.getElementById("tfidf-results");
      const yaketHighlights = document.getElementById("yaket-highlights");
      const tfidfHighlights = document.getElementById("tfidf-highlights");
      const overlap = document.getElementById("overlap");
      let renderFrame = 0;

      function populateSamplePicker() {
        samplePicker.replaceChildren(...SAMPLE_PRESETS.map((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sample-button";
          button.dataset.sampleId = item.id;
          button.textContent = item.label;
          button.setAttribute("aria-pressed", "false");
          button.addEventListener("click", () => applySample(item.id));
          return button;
        }));
      }

      function setActiveSample(id) {
        for (const button of samplePicker.querySelectorAll(".sample-button")) {
          button.setAttribute("aria-pressed", button.dataset.sampleId === id ? "true" : "false");
        }
      }

      function applySample(id) {
        const current = SAMPLE_PRESETS.find((item) => item.id === id) ?? SAMPLE_PRESETS[0];
        setActiveSample(current.id);
        input.value = current.text;
        language.value = current.language;
        ngram.value = String(current.ngram);
        top.value = String(current.top);
        render();
      }

      function countCandidates(text, stopwords, maxNgram) {
        const counts = new Map();

        for (const sentence of splitSentences(text)) {
          const words = tokenizeWords(sentence)
            .map((word) => word.toLowerCase())
            .filter((word) => word.length > 0 && !((word.startsWith("'") || word.startsWith("’")) && word.length > 1));

          for (let size = 1; size <= maxNgram; size += 1) {
            for (let index = 0; index <= words.length - size; index += 1) {
              const candidateWords = words.slice(index, index + size);
              if (candidateWords.length === 0) continue;
              if (stopwords.has(candidateWords[0]) || stopwords.has(candidateWords[candidateWords.length - 1])) continue;
              if (size === 1 && candidateWords[0].length < 3) continue;

              const candidate = candidateWords.join(" ");
              counts.set(candidate, (counts.get(candidate) ?? 0) + 1);
            }
          }
        }

        return counts;
      }

      function extractTfidf(text, corpus, stopwords, maxNgram, topK) {
        const corpusCounts = corpus.map((document) => countCandidates(document, stopwords, maxNgram));
        const targetCounts = countCandidates(text, stopwords, maxNgram);
        const totalDocuments = corpusCounts.length;

        return [...targetCounts.entries()]
          .map(([keyword, tf]) => {
            const df = corpusCounts.reduce((count, counts) => count + (counts.has(keyword) ? 1 : 0), 0);
            const idf = Math.log((1 + totalDocuments) / (1 + df)) + 1;
            return { keyword, score: tf * idf };
          })
          .sort((left, right) => right.score - left.score || left.keyword.localeCompare(right.keyword))
          .slice(0, topK);
      }

      function renderList(target, items, metadata) {
        target.replaceChildren(...items.map((item) => {
          const li = document.createElement("li");
          const title = document.createElement("div");
          title.className = "result-title";
          title.textContent = item.keyword;
          li.append(title);

          if (metadata) {
            const meta = document.createElement("span");
            meta.className = "result-meta";
            meta.textContent = metadata(item);
            li.append(meta);
          }

          return li;
        }));
      }

      function highlightText(text, keywords, className) {
        const phrases = [...new Set(keywords.map((item) => item.keyword).filter(Boolean))]
          .sort((left, right) => right.length - left.length)
          .map((value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));

        if (phrases.length === 0) {
          return escapeHtml(text);
        }

        const pattern = new RegExp(`(^|[^\\p{L}\\p{Nd}])(${phrases.join("|")})(?=$|[^\\p{L}\\p{Nd}])`, "giu");
        return escapeHtml(text).replace(pattern, `$1<mark class="${className}">$2</mark>`);
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function render() {
        status.textContent = "Comparing...";

        const topK = Number(top.value) || 10;
        const maxNgram = Number(ngram.value) || 3;
        const lang = language.value || "en";
        const text = input.value;

        const yaket = extractKeywordDetails(text, {
          language: lang,
          top: topK,
          n: maxNgram,
        }).map(({ keyword, occurrences, sentenceIds }) => ({ keyword, occurrences, sentenceIds }));

        const stopwords = loadStopwords(lang);
        const corpus = [...SAMPLE_PRESETS.map((item) => item.text), text];
        const tfidf = extractTfidf(text, corpus, stopwords, maxNgram, topK);
        const shared = tfidf.map((item) => item.keyword).filter((keyword) => yaket.some((result) => result.keyword.toLowerCase() === keyword));

        renderList(yaketResults, yaket, (row) => `${row.occurrences} occurrences · ${row.sentenceIds.length} sentence spread`);
        renderList(tfidfResults, tfidf);
        yaketHighlights.innerHTML = highlightText(text, yaket, "yaket");
        tfidfHighlights.innerHTML = highlightText(text, tfidf, "tfidf");
        overlap.textContent = shared.length > 0 ? shared.join(", ") : "No overlap in the current top results";
        updatedLabel.textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
        resultsPanel.classList.remove("updated");
        requestAnimationFrame(() => resultsPanel.classList.add("updated"));
        setTimeout(() => resultsPanel.classList.remove("updated"), 1400);
        status.textContent = `${yaket.length} Yaket topics and ${tfidf.length} TF-IDF topics shown.`;
      }

      function scheduleRender() {
        if (renderFrame) {
          cancelAnimationFrame(renderFrame);
        }

        renderFrame = requestAnimationFrame(() => {
          renderFrame = 0;
          render();
        });
      }

      input.addEventListener("input", scheduleRender);
      language.addEventListener("input", scheduleRender);
      top.addEventListener("input", scheduleRender);
      ngram.addEventListener("input", scheduleRender);

      populateSamplePicker();
      applySample(SAMPLE_PRESETS[0].id);
    </script>
  </body>
</html>
