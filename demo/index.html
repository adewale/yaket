<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yaket Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0b1020;
        color: #e5eefc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(76, 117, 255, 0.35), transparent 35%),
          radial-gradient(circle at top right, rgba(0, 209, 178, 0.2), transparent 30%),
          #0b1020;
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      h1 {
        margin-bottom: 8px;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }
      p.lead {
        max-width: 760px;
        color: #b6c5e1;
        line-height: 1.6;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 20px;
      }
      .panel {
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 18px;
        background: rgba(11, 16, 32, 0.68);
        backdrop-filter: blur(12px);
        padding: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
      }
      textarea, input, select {
        width: 100%;
        box-sizing: border-box;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(15, 23, 42, 0.8);
        color: inherit;
        padding: 12px 14px;
        font: inherit;
      }
      textarea {
        min-height: 320px;
        resize: vertical;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 700;
        background: linear-gradient(135deg, #5b8cff, #35d1b5);
        color: #07101f;
        cursor: pointer;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      li {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.72);
        padding: 12px 14px;
      }
      .score {
        color: #8bd4c6;
        font-variant-numeric: tabular-nums;
      }
      .meta {
        color: #9fb0cd;
        font-size: 0.92rem;
      }
      a {
        color: #97c4ff;
      }
      @media (max-width: 820px) {
        .layout { grid-template-columns: 1fr; }
        .controls { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Yaket Demo</h1>
      <p class="lead">
        Paste text, tweak a few knobs, and run the YAKE-style extractor in the browser via the published
        <code>@ade_oshineye/yaket</code> package.
      </p>
      <div class="layout">
        <section class="panel">
          <label for="input">Input text</label>
          <textarea id="input">Google is acquiring data science community Kaggle. Sources tell us that Google is acquiring Kaggle, a platform that hosts data science and machine learning competitions.</textarea>
          <div class="controls">
            <label>Language<input id="language" value="en" /></label>
            <label>Top results<input id="top" type="number" min="1" value="10" /></label>
            <label>Max n-gram<input id="ngram" type="number" min="1" value="3" /></label>
            <label>Dedup function
              <select id="dedupFunc">
                <option value="seqm">seqm</option>
                <option value="levs">levs</option>
                <option value="jaro">jaro</option>
              </select>
            </label>
          </div>
          <button id="run">Extract keywords</button>
        </section>
        <section class="panel">
          <h2>Results</h2>
          <p class="meta" id="status">Ready.</p>
          <ul id="results"></ul>
          <p class="meta">
            Source package: <a href="https://www.npmjs.com/package/@ade_oshineye/yaket">npm</a>
            · <a href="https://github.com/adewale/yaket">GitHub</a>
          </p>
        </section>
      </div>
    </main>
    <script type="module">
      import { extractKeywordDetails } from "https://esm.sh/@ade_oshineye/yaket@0.3.0?bundle";

      const input = document.getElementById("input");
      const language = document.getElementById("language");
      const top = document.getElementById("top");
      const ngram = document.getElementById("ngram");
      const dedupFunc = document.getElementById("dedupFunc");
      const results = document.getElementById("results");
      const status = document.getElementById("status");
      const run = document.getElementById("run");

      function render() {
        status.textContent = "Extracting...";
        const items = extractKeywordDetails(input.value, {
          lan: language.value || "en",
          top: Number(top.value) || 10,
          n: Number(ngram.value) || 3,
          dedupFunc: dedupFunc.value,
        });

        results.replaceChildren(...items.map((item) => {
          const li = document.createElement("li");
          const left = document.createElement("span");
          left.textContent = item.keyword;
          const right = document.createElement("span");
          right.className = "score";
          right.textContent = item.score.toFixed(6);
          li.append(left, right);
          return li;
        }));

        status.textContent = `${items.length} keyword${items.length === 1 ? "" : "s"} extracted.`;
      }

      run.addEventListener("click", render);
      render();
    </script>
  </body>
</html>
