<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yaket vs TF-IDF</title>
    <meta
      name="description"
      content="Compare Yaket and TF-IDF on the same text in a minimal browser demo."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #10151d;
        --panel: #171d27;
        --field: #1c2330;
        --line: rgba(205, 214, 231, 0.14);
        --line-strong: rgba(205, 214, 231, 0.24);
        --text: rgba(242, 245, 249, 0.92);
        --muted: rgba(196, 205, 220, 0.74);
        --subtle: rgba(163, 174, 193, 0.68);
        --accent: #8fb1ff;
        --shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 1.5rem max(20px, 4vw) 2.5rem;
        display: grid;
        gap: 1.25rem;
      }

      h1,
      h2,
      p,
      table {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      h2 {
        font-size: 0.95rem;
        font-weight: 650;
      }

      .intro {
        display: grid;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .intro p {
        max-width: 70ch;
        color: var(--muted);
        line-height: 1.55;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 0.85rem;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 1rem;
      }

      .sample-shell {
        display: grid;
        grid-template-columns: minmax(0, 14rem) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      button {
        font: inherit;
      }

      button:focus {
        outline: none;
      }

      button:focus-visible {
        border-color: rgba(143, 177, 255, 0.58);
        box-shadow: 0 0 0 3px rgba(143, 177, 255, 0.12);
      }

      .tab-list {
        display: grid;
        gap: 0.6rem;
        align-content: start;
      }

      .sample-tab {
        border: 1px solid var(--line-strong);
        border-radius: 0.8rem;
        background: #202a39;
        color: var(--text);
        cursor: pointer;
        padding: 0.7rem 0.95rem;
        text-align: left;
        width: 100%;
      }

      .sample-tab:hover,
      .sample-tab:focus-visible {
        border-color: rgba(143, 177, 255, 0.48);
        background: #263245;
      }

      .sample-tab[aria-selected="true"] {
        border-color: rgba(143, 177, 255, 0.58);
        background: rgba(143, 177, 255, 0.16);
      }

      .sample-content {
        border: 1px solid rgba(205, 214, 231, 0.08);
        border-radius: 0.8rem;
        background: var(--field);
        padding: 1rem;
        min-height: 16rem;
        align-content: start;
      }

      .sample-copy {
        color: var(--muted);
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .results-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      #results-panel {
        min-height: 23rem;
      }

      .results-table th,
      .results-table td {
        padding: 0.8rem 0.9rem;
        text-align: left;
        vertical-align: top;
        border-top: 1px solid var(--line);
      }

      .results-table thead th {
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 650;
        border-top: 0;
      }

      .results-table tbody td {
        color: var(--text);
        word-break: break-word;
      }

      @media (max-width: 760px) {
        .sample-shell {
          grid-template-columns: 1fr;
        }

        .results-table,
        .results-table thead,
        .results-table tbody,
        .results-table tr,
        .results-table th,
        .results-table td {
          display: block;
        }

        .results-table thead {
          display: none;
        }

        .results-table tr {
          border-top: 1px solid var(--line);
          padding: 0.6rem 0;
        }

        .results-table td {
          border-top: 0;
          padding: 0.35rem 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <h1>Yaket vs TF-IDF</h1>
        <p>
          Compare Yaket and TF-IDF on the same text. Yaket is <strong>Single-document</strong>, uses
          <strong>Local statistical features</strong>, and needs <strong>No training corpus</strong>.
        </p>
      </section>

      <section class="panel stack">
        <h2>Sample text</h2>
        <div class="sample-shell">
          <div class="tab-list" id="sample-tabs" role="tablist" aria-label="Sample texts"></div>
          <section class="sample-content stack" id="sample-panel" role="tabpanel" aria-live="polite">
            <h2 id="sample-title">—</h2>
            <p class="sample-copy" id="sample-text">—</p>
          </section>
        </div>
      </section>

      <section class="panel stack" id="results-panel">
        <h2>Results</h2>
        <table class="results-table">
          <thead>
            <tr>
              <th scope="col">Yaket</th>
              <th scope="col">TF-IDF</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module">
      import { extractKeywordDetails, loadStopwords, splitSentences, tokenizeWords } from "https://esm.sh/@ade_oshineye/yaket@0.4.0?bundle";

      const SAMPLE_PRESETS = [
        {
          id: "abstract",
          label: "Scientific abstract",
          language: "en",
          ngram: 3,
          top: 10,
          text: `We present a lightweight keyword extraction method for single documents based on multiple local statistical features. The method combines term frequency, sentence position, spread, casing patterns, and term co-occurrence to rank both single-word and multi-word candidates without using an external corpus or supervised training data. Experimental results on benchmark datasets show strong overlap with reference YAKE outputs while remaining practical for browser and edge runtimes.`
        },
        {
          id: "news",
          label: "News article",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Google is acquiring data science community Kaggle. Sources tell us that Google is acquiring Kaggle, a platform that hosts data science and machine learning competitions. Details about the transaction remain somewhat vague, but the acquisition would give Google access to one of the largest communities of practicing data scientists and machine learning competitors.`
        },
        {
          id: "newsletter",
          label: "Newsletter",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Consumer AI is being absorbed by platforms. Enterprise AI converges around a few vendors. Vertical AI is the third path. If consumer gets absorbed by incumbents and enterprise consolidates around platforms, vertical AI carves out domain-specific value. The APIs become commodities. Meta just acqui-hired both Gizmo and Dreamer. Karpathy's software model evolves. The ecosystem grows through network effects.`
        },
        {
          id: "product-docs",
          label: "Product docs",
          language: "en",
          ngram: 2,
          top: 10,
          text: `The indexing service creates hybrid retrieval metadata for each chunk. It stores BM25 text fields, dense embeddings, chunk-level filters, and weighted keywords. Incremental reindexing reuses previous vectors, but always refreshes keyword metadata so search results stay explainable and debuggable.`
        }
      ];

      const sampleTabs = document.getElementById("sample-tabs");
      const samplePanel = document.getElementById("sample-panel");
      const sampleTitle = document.getElementById("sample-title");
      const sampleText = document.getElementById("sample-text");
      const resultsBody = document.getElementById("results-body");
      let currentSampleId = SAMPLE_PRESETS[0].id;

      function populateSampleTabs() {
        sampleTabs.replaceChildren(...SAMPLE_PRESETS.map((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.id = `tab-${item.id}`;
          button.className = "sample-tab";
          button.dataset.sampleId = item.id;
          button.setAttribute("role", "tab");
          button.setAttribute("aria-controls", "sample-panel");
          button.setAttribute("aria-selected", "false");
          button.textContent = item.label;
          button.addEventListener("click", () => applySample(item.id));
          return button;
        }));
      }

      function setActiveSample(id) {
        currentSampleId = id;

        for (const button of sampleTabs.querySelectorAll(".sample-tab")) {
          const isActive = button.dataset.sampleId === id;
          button.setAttribute("aria-selected", isActive ? "true" : "false");
          button.tabIndex = isActive ? 0 : -1;
        }

        samplePanel.setAttribute("aria-labelledby", `tab-${id}`);
      }

      function countCandidates(text, stopwords, maxNgram) {
        const counts = new Map();

        for (const sentence of splitSentences(text)) {
          const words = tokenizeWords(sentence)
            .map((word) => word.toLowerCase())
            .filter((word) => word.length > 0 && !((word.startsWith("'") || word.startsWith("’")) && word.length > 1));

          for (let size = 1; size <= maxNgram; size += 1) {
            for (let index = 0; index <= words.length - size; index += 1) {
              const candidateWords = words.slice(index, index + size);
              if (candidateWords.length === 0) continue;
              if (stopwords.has(candidateWords[0]) || stopwords.has(candidateWords[candidateWords.length - 1])) continue;
              if (size === 1 && candidateWords[0].length < 3) continue;

              const candidate = candidateWords.join(" ");
              counts.set(candidate, (counts.get(candidate) ?? 0) + 1);
            }
          }
        }

        return counts;
      }

      function extractTfidf(text, corpus, stopwords, maxNgram, topK) {
        const corpusCounts = corpus.map((document) => countCandidates(document, stopwords, maxNgram));
        const targetCounts = countCandidates(text, stopwords, maxNgram);
        const totalDocuments = corpusCounts.length;

        return [...targetCounts.entries()]
          .map(([keyword, tf]) => {
            const df = corpusCounts.reduce((count, counts) => count + (counts.has(keyword) ? 1 : 0), 0);
            const idf = Math.log((1 + totalDocuments) / (1 + df)) + 1;
            return { keyword, score: tf * idf };
          })
          .sort((left, right) => right.score - left.score || left.keyword.localeCompare(right.keyword))
          .slice(0, topK);
      }

      function sortKeywords(keywords) {
        return [...new Set(keywords.filter(Boolean))]
          .sort((left, right) => left.localeCompare(right, undefined, { sensitivity: "base" }));
      }

      function renderResults(sample) {
        const yaketKeywords = sortKeywords(
          extractKeywordDetails(sample.text, {
            language: sample.language,
            top: sample.top,
            n: sample.ngram,
          }).map(({ keyword }) => keyword)
        );

        const stopwords = loadStopwords(sample.language);
        const tfidfKeywords = sortKeywords(
          extractTfidf(sample.text, SAMPLE_PRESETS.map((item) => item.text), stopwords, sample.ngram, sample.top)
            .map(({ keyword }) => keyword)
        );

        const rowCount = Math.max(yaketKeywords.length, tfidfKeywords.length, 1);
        resultsBody.replaceChildren(...Array.from({ length: rowCount }, (_, index) => {
          const row = document.createElement("tr");
          const yaketCell = document.createElement("td");
          const tfidfCell = document.createElement("td");
          yaketCell.textContent = yaketKeywords[index] ?? "—";
          tfidfCell.textContent = tfidfKeywords[index] ?? "—";
          row.append(yaketCell, tfidfCell);
          return row;
        }));
      }

      function applySample(id) {
        const sample = SAMPLE_PRESETS.find((item) => item.id === id) ?? SAMPLE_PRESETS[0];
        setActiveSample(sample.id);
        sampleTitle.textContent = sample.label;
        sampleText.textContent = sample.text;
        renderResults(sample);
      }

      sampleTabs.addEventListener("keydown", (event) => {
        if (event.key !== "ArrowRight" && event.key !== "ArrowLeft") {
          return;
        }

        const direction = event.key === "ArrowRight" ? 1 : -1;
        const currentIndex = SAMPLE_PRESETS.findIndex((item) => item.id === currentSampleId);
        const nextIndex = (currentIndex + direction + SAMPLE_PRESETS.length) % SAMPLE_PRESETS.length;
        const nextSample = SAMPLE_PRESETS[nextIndex];
        applySample(nextSample.id);
        document.getElementById(`tab-${nextSample.id}`)?.focus();
      });

      populateSampleTabs();
      applySample(currentSampleId);
    </script>
  </body>
</html>
