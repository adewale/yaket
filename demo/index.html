<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yaket vs TF-IDF</title>
    <meta
      name="description"
      content="Compare Yaket and TF-IDF on the same text in a minimal browser demo."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #10151d;
        --panel: #171d27;
        --field: #1c2330;
        --line: rgba(205, 214, 231, 0.14);
        --line-strong: rgba(205, 214, 231, 0.24);
        --text: rgba(242, 245, 249, 0.92);
        --muted: rgba(196, 205, 220, 0.74);
        --subtle: rgba(163, 174, 193, 0.68);
        --accent: #8fb1ff;
        --shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem max(20px, 4vw) 2.5rem;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      h2 {
        font-size: 0.95rem;
        font-weight: 650;
      }

      .intro {
        display: grid;
        gap: 0.6rem;
        margin-bottom: 1rem;
      }

      .intro p {
        max-width: 70ch;
        color: var(--muted);
        line-height: 1.55;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 0.85rem;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 1rem;
      }

      .stack {
        display: grid;
        gap: 1rem;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-size: 0.92rem;
        font-weight: 550;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border-radius: 0.7rem;
        border: 1px solid var(--line);
        background: var(--field);
        color: var(--text);
        padding: 0.78rem 0.88rem;
      }

      textarea {
        min-height: 14rem;
        resize: vertical;
        line-height: 1.55;
      }

      input:focus,
      select:focus,
      textarea:focus,
      button:focus {
        outline: none;
      }

      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      button:focus-visible {
        border-color: rgba(143, 177, 255, 0.58);
        box-shadow: 0 0 0 3px rgba(143, 177, 255, 0.12);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line-strong);
        border-radius: 0.7rem;
        background: #202a39;
        color: var(--text);
        cursor: pointer;
        padding: 0.8rem 1rem;
      }

      button:hover,
      button:focus-visible {
        border-color: rgba(143, 177, 255, 0.48);
        background: #263245;
      }

      .status {
        color: var(--subtle);
        font-size: 0.92rem;
      }

      .results {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 0.65rem 0;
        border-top: 1px solid rgba(205, 214, 231, 0.08);
        vertical-align: top;
      }

      th {
        border-top: 0;
        color: var(--subtle);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-align: left;
        text-transform: uppercase;
      }

      th:last-child,
      td:last-child {
        text-align: right;
      }

      .result-title {
        font-weight: 600;
      }

      .result-meta {
        display: block;
        margin-top: 0.18rem;
        color: var(--subtle);
        font-size: 0.8rem;
      }

      @media (max-width: 760px) {
        .controls,
        .results {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro">
        <h1>Yaket vs TF-IDF</h1>
        <p>
          Compare Yaket and TF-IDF on the same text. Yaket is <strong>Single-document</strong>, uses
          <strong>Local statistical features</strong>, and needs <strong>No training corpus</strong>. Lower Yaket score means more relevant.
        </p>
      </section>

      <section class="panel stack">
        <form id="controls" onsubmit="return false;">
          <div class="controls">
            <label for="sample">Sample text
              <select id="sample"></select>
            </label>
            <label for="language">Language
              <input id="language" value="en" autocomplete="off" />
            </label>
            <label for="top">Top results
              <input id="top" type="number" min="1" value="10" />
            </label>
            <label for="ngram">Max n-gram
              <input id="ngram" type="number" min="1" value="3" />
            </label>
          </div>

          <label for="input">Text
            <textarea id="input"></textarea>
          </label>

          <div class="actions">
            <button id="run" type="button">Compare</button>
            <span class="status" id="status">Ready.</span>
          </div>
        </form>

        <div class="results">
          <section>
            <h2>Yaket results</h2>
            <table>
              <thead>
                <tr><th>Phrase</th><th>Score</th></tr>
              </thead>
              <tbody id="yaket-results"></tbody>
            </table>
          </section>

          <section>
            <h2>TF-IDF baseline</h2>
            <table>
              <thead>
                <tr><th>Phrase</th><th>Score</th></tr>
              </thead>
              <tbody id="tfidf-results"></tbody>
            </table>
          </section>
        </div>

        <section>
          <h2>Overlap</h2>
          <div class="status" id="overlap">—</div>
        </section>
      </section>
    </main>

    <script type="module">
      import { extractKeywordDetails, loadStopwords, splitSentences, tokenizeWords } from "https://esm.sh/@ade_oshineye/yaket@0.4.0?bundle";

      const SAMPLE_PRESETS = [
        {
          id: "abstract",
          label: "Scientific abstract",
          language: "en",
          ngram: 3,
          top: 10,
          text: `We present a lightweight keyword extraction method for single documents based on multiple local statistical features. The method combines term frequency, sentence position, spread, casing patterns, and term co-occurrence to rank both single-word and multi-word candidates without using an external corpus or supervised training data. Experimental results on benchmark datasets show strong overlap with reference YAKE outputs while remaining practical for browser and edge runtimes.`
        },
        {
          id: "news",
          label: "News article",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Google is acquiring data science community Kaggle. Sources tell us that Google is acquiring Kaggle, a platform that hosts data science and machine learning competitions. Details about the transaction remain somewhat vague, but the acquisition would give Google access to one of the largest communities of practicing data scientists and machine learning competitors.`
        },
        {
          id: "newsletter",
          label: "Newsletter",
          language: "en",
          ngram: 3,
          top: 10,
          text: `Consumer AI is being absorbed by platforms. Enterprise AI converges around a few vendors. Vertical AI is the third path. If consumer gets absorbed by incumbents and enterprise consolidates around platforms, vertical AI carves out domain-specific value. The APIs become commodities. Meta just acqui-hired both Gizmo and Dreamer. Karpathy's software model evolves. The ecosystem grows through network effects.`
        },
        {
          id: "product-docs",
          label: "Product docs",
          language: "en",
          ngram: 2,
          top: 10,
          text: `The indexing service creates hybrid retrieval metadata for each chunk. It stores BM25 text fields, dense embeddings, chunk-level filters, and weighted keywords. Incremental reindexing reuses previous vectors, but always refreshes keyword metadata so search results stay explainable and debuggable.`
        }
      ];

      const sample = document.getElementById("sample");
      const input = document.getElementById("input");
      const language = document.getElementById("language");
      const top = document.getElementById("top");
      const ngram = document.getElementById("ngram");
      const status = document.getElementById("status");
      const yaketResults = document.getElementById("yaket-results");
      const tfidfResults = document.getElementById("tfidf-results");
      const overlap = document.getElementById("overlap");
      const run = document.getElementById("run");

      function populateSampleSelect() {
        sample.replaceChildren(...SAMPLE_PRESETS.map((item) => {
          const option = document.createElement("option");
          option.value = item.id;
          option.textContent = item.label;
          return option;
        }));
      }

      function applySample(id) {
        const current = SAMPLE_PRESETS.find((item) => item.id === id) ?? SAMPLE_PRESETS[0];
        sample.value = current.id;
        input.value = current.text;
        language.value = current.language;
        ngram.value = String(current.ngram);
        top.value = String(current.top);
        render();
      }

      function countCandidates(text, stopwords, maxNgram) {
        const counts = new Map();

        for (const sentence of splitSentences(text)) {
          const words = tokenizeWords(sentence)
            .map((word) => word.toLowerCase())
            .filter((word) => word.length > 0 && !((word.startsWith("'") || word.startsWith("’")) && word.length > 1));

          for (let size = 1; size <= maxNgram; size += 1) {
            for (let index = 0; index <= words.length - size; index += 1) {
              const candidateWords = words.slice(index, index + size);
              if (candidateWords.length === 0) continue;
              if (stopwords.has(candidateWords[0]) || stopwords.has(candidateWords[candidateWords.length - 1])) continue;
              if (size === 1 && candidateWords[0].length < 3) continue;

              const candidate = candidateWords.join(" ");
              counts.set(candidate, (counts.get(candidate) ?? 0) + 1);
            }
          }
        }

        return counts;
      }

      function extractTfidf(text, corpus, stopwords, maxNgram, topK) {
        const corpusCounts = corpus.map((document) => countCandidates(document, stopwords, maxNgram));
        const targetCounts = countCandidates(text, stopwords, maxNgram);
        const totalDocuments = corpusCounts.length;

        return [...targetCounts.entries()]
          .map(([keyword, tf]) => {
            const df = corpusCounts.reduce((count, counts) => count + (counts.has(keyword) ? 1 : 0), 0);
            const idf = Math.log((1 + totalDocuments) / (1 + df)) + 1;
            return { keyword, score: tf * idf };
          })
          .sort((left, right) => right.score - left.score || left.keyword.localeCompare(right.keyword))
          .slice(0, topK);
      }

      function renderRows(tbody, rows, metadata) {
        tbody.replaceChildren(...rows.map((row, index) => {
          const tr = document.createElement("tr");
          const phraseCell = document.createElement("td");
          const title = document.createElement("div");
          title.className = "result-title";
          title.textContent = `${index + 1}. ${row.keyword}`;
          phraseCell.append(title);

          if (metadata) {
            const meta = document.createElement("span");
            meta.className = "result-meta";
            meta.textContent = metadata(row);
            phraseCell.append(meta);
          }

          const scoreCell = document.createElement("td");
          scoreCell.textContent = row.score.toFixed(6);
          tr.append(phraseCell, scoreCell);
          return tr;
        }));
      }

      function render() {
        status.textContent = "Comparing...";

        const topK = Number(top.value) || 10;
        const maxNgram = Number(ngram.value) || 3;
        const lang = language.value || "en";
        const text = input.value;

        const yaket = extractKeywordDetails(text, {
          language: lang,
          top: topK,
          n: maxNgram,
        });

        const stopwords = loadStopwords(lang);
        const corpus = [...SAMPLE_PRESETS.map((item) => item.text), text];
        const tfidf = extractTfidf(text, corpus, stopwords, maxNgram, topK);
        const shared = tfidf.map((item) => item.keyword).filter((keyword) => yaket.some((result) => result.normalizedKeyword === keyword));

        renderRows(yaketResults, yaket, (row) => `${row.occurrences} occurrences · ${row.sentenceIds.length} sentence spread`);
        renderRows(tfidfResults, tfidf);
        overlap.textContent = shared.length > 0 ? shared.join(", ") : "No overlap in the current top results";
        status.textContent = `${yaket.length} Yaket keyphrases and ${tfidf.length} TF-IDF phrases compared. Lower score means more relevant.`;
      }

      sample.addEventListener("change", (event) => applySample(event.target.value));
      run.addEventListener("click", render);

      populateSampleSelect();
      applySample(SAMPLE_PRESETS[0].id);
    </script>
  </body>
</html>
